{% extends "base.html" %}
{% block content %}

<div style="max-width: 500px; margin: 0 auto;">
    <h2 class="mb-4">🔐 Admin Password Reset</h2>
    
    <div class="table-container">
        <p style="color: #64748b; margin-bottom: 20px;">Force reset a user's password if they forgot it.</p>
        
        <form method="post">
            <label style="font-weight: 600;">Target Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
            
            <label style="font-weight: 600; margin-top: 15px;">New Password</label>
            <input type="password" name="password" placeholder="Enter new password" required>
            
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px; background: #dc2626;">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}

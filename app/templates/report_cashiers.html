{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">🧑‍💼 Cashier Performance</h2>
<div class="table-container">
    <table class="styled-table">
        <thead>
            <tr>
                <th>Cashier Name</th>
                <th>Total Bills Generated</th>
                <th>Total Revenue Collected</th>
            </tr>
        </thead>
        <tbody>
            {% for r in data %}
            <tr>
                <td style="font-weight: bold;">{{ r[0] }}</td>
                <td>{{ r[1] }}</td>
                <td style="color: var(--primary-blue); font-weight: bold;">₹{{ "%.2f"|format(r[2] or 0) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}

<div style="max-width: 600px; margin: 0 auto;">
    <h2 class="mb-4">✏️ Edit Product</h2>

    <div class="table-container">
        <form method="POST">
            <label style="font-weight: 600; color: #475569;">Product Name</label>
            <input name="name" value="{{ product.name }}" required>

            <label style="font-weight: 600; color: #475569;">Category</label>
            <input name="category" value="{{ product.category }}">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="font-weight: 600; color: #475569;">Purchase Price (₹)</label>
                    <input type="number" step="0.01" name="purchasing_price" value="{{ product.purchasing_price }}" required>
                </div>
                <div>
                    <label style="font-weight: 600; color: #475569;">Selling Price (₹)</label>
                    <input type="number" step="0.01" name="selling_price" value="{{ product.selling_price }}" required>
                </div>
            </div>

            <hr style="margin: 20px 0; border-top: 1px dashed #cbd5e1;">

            <label style="font-weight: 600; color: #166534;">📦 Add Stock (Restock)</label>
            <input type="number" name="added_quantity" value="0" placeholder="Enter quantity to add">
            <small style="color: #64748b;">Current Stock: <b>{{ product.stock }}</b></small>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 25px;">Update Product</button>
        </form>
    </div>
    
    <div style="text-align: center; margin-top: 15px;">
        <a href="{{ url_for('products.products') }}" style="color: #64748b; text-decoration: none;">Cancel</a>
    </div>
</div>

{% endblock %}
